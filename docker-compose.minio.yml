# docker-compose.minio.yml
version: "3.8"

services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000" # API / SDK endpoint
      - "9001:9001" # Web Console
    environment:
      MINIO_ROOT_USER: alpha
      MINIO_ROOT_PASSWORD: alpha123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Opsional: auto-create bucket saat startup
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 alpha alpha123 &&
        mc mb --ignore-existing local/alpha &&
        mc anonymous set public local/alpha &&
        echo 'Bucket alpha siap.' &&
        exit 0
      "

volumes:
  minio_data:
    driver: local
